version: '3.8'

services:
  backend-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-admin-system
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ./databases:/app/databases
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/dashboard/stats', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend-admin-network

  nginx:
    image: nginx:alpine
    container_name: backend-admin-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - backend-admin
    networks:
      - backend-admin-network

networks:
  backend-admin-network:
    driver: bridge

volumes:
  backend-admin-data:
    driver: local
